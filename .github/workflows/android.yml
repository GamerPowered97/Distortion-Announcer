name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Optimized Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: distortion-tracker-release-apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create or Update GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION_NAME=$(grep -E 'versionName\s*=\s*' app/build.gradle.kts | head -n1 | cut -d'"' -f2)
        TAG_NAME="v$VERSION_NAME"
        echo "Releasing version $VERSION_NAME (tag: $TAG_NAME)"
        
        if gh release view "$TAG_NAME" >/dev/null 2>&1; then
          gh release upload "$TAG_NAME" app/build/outputs/apk/release/app-release.apk --clobber
        else
          gh release create "$TAG_NAME" app/build/outputs/apk/release/app-release.apk --title "v$VERSION_NAME" --notes "Automated release for version $VERSION_NAME."
        fi
